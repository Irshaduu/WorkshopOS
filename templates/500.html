<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f3f4f6; color: #1e293b; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; font-family: system-ui, -apple-system, sans-serif; }
        .error-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-width: 500px; width: 90%; }
        h1 { font-size: 5rem; font-weight: 800; color: #ef4444; margin-bottom: 0; }
        h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; color: #334155; }
        p { color: #64748b; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="error-card">
        <h1>500</h1>
        <h2>System Error</h2>
        <p>Something went wrong on our end. The development team has been notified. Please try again later.</p>
        <a href="/" class="btn btn-primary px-4 py-2">Go to Dashboard</a>
    </div>
</body>
</html>
